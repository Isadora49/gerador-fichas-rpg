<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editor de Fichas RPG v3.0</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #1a1a1a; color: white; overflow: hidden; }
        #toolbar { padding: 15px; background: #222; border-bottom: 2px solid #e74c3c; display: flex; gap: 15px; align-items: center; z-index: 1000; }
        #viewer-container { flex: 1; overflow: auto; position: relative; background: #333; display: flex; justify-content: center; }
        #canvas-wrapper { position: relative; margin: 20px; }
        canvas { border: 1px solid #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair; }
        button { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; cursor: not-allowed; }

        /* Marcador Interativo */
        .marker {
            position: absolute;
            background: rgba(231, 76, 60, 0.6);
            border: 2px solid #e74c3c;
            color: white;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: move;
            resize: both;
            overflow: hidden;
            min-width: 30px;
            min-height: 15px;
            user-select: none;
            z-index: 500;
        }
        .marker.selected { border-color: #00ff00; background: rgba(0, 255, 0, 0.4); }

        /* Menu de Edição */
        #field-menu {
            position: fixed;
            background: #2c3e50;
            border: 1px solid #e74c3c;
            padding: 10px;
            border-radius: 8px;
            display: none;
            flex-direction: column;
            gap: 8px;
            z-index: 2000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 180px;
        }
        #field-menu label { font-size: 12px; color: #bdc3c7; }
        #field-menu input, #field-menu select { background: #34495e; color: white; border: 1px solid #7f8c8d; padding: 4px; border-radius: 3px; }
    </style>
</head>
<body>

<div id="toolbar">
    <input type="file" id="uploadPdf" accept="application/pdf">
    <div id="status">Aguardando PDF...</div>
    <button id="btnDownload" disabled>BAIXAR PDF CONFIGURADO</button>
</div>

<div id="viewer-container">
    <div id="canvas-wrapper">
        <canvas id="pdf-canvas"></canvas>
    </div>
</div>

<div id="field-menu">
    <strong id="menu-title" style="font-size: 14px; margin-bottom: 5px; display: block;">Editar Campo</strong>
    <label>Nome (ID PDF):</label>
    <input type="text" id="edit-name">
    
    <label>Alinhamento:</label>
    <select id="edit-align">
        <option value="Left">Esquerda</option>
        <option value="Center">Centro</option>
        <option value="Right">Direita</option>
    </select>

    <label>
        <input type="checkbox" id="edit-multiline"> Multilinha
    </label>
    <label>
        <input type="checkbox" id="edit-readonly"> Apenas Leitura
    </label>
    <hr style="width:100%; border:0; border-top:1px solid #444">
    <button onclick="saveMenu()" style="padding: 5px; background: #27ae60;">Salvar</button>
    <button onclick="closeMenu()" style="padding: 5px; background: #7f8c8d;">Fechar</button>
</div>

<script src="script.js"></script>
</body>
</html>
