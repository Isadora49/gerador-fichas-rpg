<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editor de Fichas RPG v2.0</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #1a1a1a; color: white; overflow: hidden; }
        #toolbar { padding: 15px; background: #222; border-bottom: 2px solid #e74c3c; display: flex; gap: 15px; align-items: center; z-index: 1000; }
        #viewer-container { flex: 1; overflow: auto; position: relative; background: #333; display: flex; justify-content: center; }
        #canvas-wrapper { position: relative; margin: 20px; }
        canvas { border: 1px solid #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair; }
        button { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; cursor: not-allowed; }
        
        /* Marcador Interativo */
        .marker {
            position: absolute;
            background: rgba(231, 76, 60, 0.6);
            border: 2px solid #e74c3c;
            color: white;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: move;
            resize: both;
            overflow: hidden;
            min-width: 30px;
            min-height: 15px;
            user-select: none;
            z-index: 500;
        }
        .marker .label-text { pointer-events: none; padding: 2px; }

        /* --- CSS DO NOVO MODAL DE EDIÇÃO --- */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center;
        }
        #modal-content {
            background: #222; padding: 20px; border-radius: 8px; width: 350px;
            border: 2px solid #e74c3c; display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }
        .modal-row { display: flex; justify-content: space-between; align-items: center; }
        .modal-row label { font-size: 14px; }
        .modal-row input[type="text"], .modal-row select {
            background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; width: 55%;
        }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .modal-actions button.cancel { background: #555; }
    </style>
</head>
<body>

<div id="toolbar">
    <input type="file" id="uploadPdf" accept="application/pdf">
    <div id="status">Aguardando PDF...</div>
    <button id="btnDownload" disabled>BAIXAR PDF CONFIGURADO</button>
</div>

<div id="viewer-container">
    <div id="canvas-wrapper">
        <canvas id="pdf-canvas"></canvas>
    </div>
</div>

<div id="modal-overlay">
    <div id="modal-content">
        <h3 style="margin-top:0; border-bottom: 1px solid #444; padding-bottom: 10px;">Configurar Campo</h3>
        <div class="modal-row"><label>Nome de Exibição:</label><input type="text" id="m-label"></div>
        <div class="modal-row"><label>Nome no PDF:</label><input type="text" id="m-name" title="Atenção: Mudar este nome pode quebrar os scripts de cálculo automático."></div>
        <div class="modal-row"><label>Tipo de Campo:</label>
            <select id="m-type">
                <option value="text">Texto</option>
                <option value="dropdown">Lista (Dropdown)</option>
            </select>
        </div>
        <div class="modal-row"><label>Valor Padrão:</label><input type="text" id="m-default"></div>
        <div class="modal-row"><label>Alinhamento:</label>
            <select id="m-align">
                <option value="center">Centro</option>
                <option value="left">Esquerda</option>
            </select>
        </div>
        <div class="modal-row"><label>Multilinha:</label><input type="checkbox" id="m-multi"></div>
        <div class="modal-row"><label>Apenas Leitura:</label><input type="checkbox" id="m-readonly"></div>
        <div class="modal-actions">
            <button class="cancel" id="m-cancel">Cancelar</button>
            <button id="m-save">Salvar Modificações</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
