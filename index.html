<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editor T20 - Corrigido 2026</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #toolbar { padding: 10px; background: #333; display: flex; gap: 10px; align-items: center; z-index: 100; }
        #viewer-container { flex: 1; overflow: auto; position: relative; background: #525659; text-align: center; }
        canvas { border: 2px solid #000; margin: 20px auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair; }
        button { padding: 10px 20px; background: #27ae60; border: none; color: white; cursor: pointer; font-weight: bold; border-radius: 5px; }
        button:disabled { background: #555; cursor: not-allowed; }
        .marker { position: absolute; background: rgba(255, 0, 0, 0.6); color: white; padding: 2px 5px; border-radius: 3px; font-size: 12px; pointer-events: none; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

<div id="toolbar">
    <input type="file" id="uploadPdf" accept="application/pdf">
    <span id="status">Suba um PDF</span>
    <button id="btnDownload" disabled>BAIXAR PDF AGORA</button>
</div>

<div id="viewer-container" id="container">
    <canvas id="pdf-canvas"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
