<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editor de Fichas RPG v3.0 - Dinâmico</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #1a1a1a; color: white; overflow: hidden; }
        #toolbar { padding: 15px; background: #222; border-bottom: 2px solid #e74c3c; display: flex; gap: 15px; align-items: center; z-index: 1000; flex-wrap: wrap; }
        #viewer-container { flex: 1; overflow: auto; position: relative; background: #333; display: flex; justify-content: center; }
        #canvas-wrapper { position: relative; margin: 20px; }
        canvas { border: 1px solid #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair; }
        
        button { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; cursor: not-allowed; }
        input[type="number"] { width: 60px; padding: 5px; border-radius: 3px; border: none; }

        /* Menu de Configuração do Campo */
        #field-config-menu {
            position: absolute;
            background: #2c3e50;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none;
            z-index: 2000;
            border: 1px solid #e74c3c;
            width: 200px;
        }
        #field-config-menu select, #field-config-menu input {
            width: 100%;
            margin-bottom: 10px;
            padding: 5px;
            background: #34495e;
            color: white;
            border: 1px solid #555;
        }

        .marker {
            position: absolute;
            background: rgba(231, 76, 60, 0.6);
            border: 2px solid #e74c3c;
            color: white;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: move;
            resize: both;
            overflow: hidden;
            min-width: 30px;
            min-height: 15px;
            user-select: none;
            z-index: 500;
        }
        .marker .label-text { pointer-events: none; padding: 2px; }
        .remove-btn { position: absolute; top: 0; right: 0; background: black; color: white; border: none; cursor: pointer; font-size: 8px; }
    </style>
</head>
<body>

<div id="toolbar">
    <input type="file" id="uploadPdf" accept="application/pdf">
    <label>Limite de Campos: <input type="number" id="limitFields" placeholder="Ex: 10" min="1"></label>
    <div id="status">Aguardando PDF...</div>
    <button id="btnDownload" disabled>GERAR PDF FINAL</button>
</div>

<div id="viewer-container">
    <div id="canvas-wrapper">
        <canvas id="pdf-canvas"></canvas>
    </div>
</div>

<div id="field-config-menu">
    <label>Tipo de Lógica:</label>
    <select id="fieldType">
        <option value="text">Texto Simples</option>
        <option value="multiline">Texto Multi-linha</option>
        <option value="class_dropdown">Menu de Classes (C1)</option>
        <option value="nivel">Nível (Gatilho)</option>
        <option value="dado_auto">Dado Automático</option>
        <option value="resultado">Total (Calculado)</option>
    </select>
    <label>Nome/ID (ex: c1, c2):</label>
    <input type="text" id="fieldName" placeholder="Obrigatório">
    <button id="btnConfirmField">Adicionar Campo</button>
    <button id="btnCancelField" style="background:#555; margin-top:5px;">Cancelar</button>
</div>

<script src="script.js"></script>
</body>
</html>
