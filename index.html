<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editor de Fichas RPG v3.0 - Dinâmico</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #1a1a1a; color: white; overflow: hidden; }
        #toolbar { padding: 10px 15px; background: #222; border-bottom: 2px solid #e74c3c; display: flex; gap: 10px; align-items: center; z-index: 1000; flex-wrap: wrap; }
        #viewer-container { flex: 1; overflow: auto; position: relative; background: #333; display: flex; justify-content: center; }
        #canvas-wrapper { position: relative; margin: 20px; }
        canvas { border: 1px solid #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        button { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; cursor: not-allowed; }
        input[type="number"] { width: 50px; padding: 5px; border-radius: 4px; border: none; }

        /* Marcador */
        .marker {
            position: absolute;
            background: rgba(231, 76, 60, 0.4);
            border: 2px solid #e74c3c;
            color: white;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: move;
            resize: both;
            overflow: hidden;
            min-width: 40px;
            min-height: 20px;
            z-index: 500;
        }

        /* Menu de Configuração do Campo */
        #field-menu {
            position: fixed;
            background: #2c3e50;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none;
            z-index: 2000;
            border: 1px solid #e74c3c;
            width: 200px;
        }
        #field-menu label { display: block; font-size: 12px; margin-bottom: 5px; color: #ecf0f1; }
        #field-menu select, #field-menu input { width: 100%; margin-bottom: 10px; background: #34495e; color: white; border: 1px solid #7f8c8d; padding: 4px; }
        .menu-btns { display: flex; gap: 5px; }
        .btn-delete { background: #c0392b; flex: 1; }
        .btn-save { background: #27ae60; flex: 1; }
    </style>
</head>
<body>

<div id="toolbar">
    <input type="file" id="uploadPdf" accept="application/pdf">
    <label>Limite de Campos:</label>
    <input type="number" id="fieldLimit" value="50" min="1">
    <button id="btnAddField" disabled>+ NOVO CAMPO</button>
    <div id="status">Aguardando PDF...</div>
    <button id="btnDownload" disabled>GERAR PDF FINAL</button>
</div>

<div id="viewer-container">
    <div id="canvas-wrapper">
        <canvas id="pdf-canvas"></canvas>
    </div>
</div>

<div id="field-menu">
    <label>Nome/Label do Campo:</label>
    <input type="text" id="edit-label">
    
    <label>Tipo de Lógica:</label>
    <select id="edit-type">
        <option value="text">Texto Simples</option>
        <option value="multiline">Texto Multi-linha</option>
        <option value="class-select">Seletor de Classe (Base)</option>
        <option value="level">Nível (Gatilho)</option>
        <option value="dice">Dado (Automático)</option>
        <option value="total">Total (Cálculo)</option>
    </select>

    <div class="menu-btns">
        <button class="btn-delete" onclick="deleteField()">Excluir</button>
        <button class="btn-save" onclick="closeMenu()">OK</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
