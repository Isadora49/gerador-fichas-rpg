<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editor de Fichas RPG v3.0 - Dinâmico</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #1a1a1a; color: white; overflow: hidden; }
        #toolbar { padding: 10px; background: #222; border-bottom: 2px solid #e74c3c; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; z-index: 1000; }
        #viewer-container { flex: 1; overflow: auto; position: relative; background: #333; display: flex; justify-content: center; }
        #canvas-wrapper { position: relative; margin: 20px; }
        canvas { border: 1px solid #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair; }
        
        button { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; cursor: not-allowed; }
        input, select, textarea { background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; }

        /* Marcador */
        .marker {
            position: absolute; background: rgba(231, 76, 60, 0.6); border: 2px solid #e74c3c;
            color: white; font-size: 10px; font-weight: bold; display: flex; align-items: center;
            justify-content: center; text-align: center; cursor: move; resize: both;
            overflow: hidden; min-width: 30px; min-height: 15px; user-select: none; z-index: 500;
        }

        /* Modal de Configuração */
        #config-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #2c3e50; padding: 20px; border-radius: 10px; border: 2px solid #e74c3c;
            z-index: 2000; width: 350px; box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        #config-modal h3 { margin-top: 0; color: #e74c3c; }
        .form-group { margin-bottom: 10px; display: flex; flex-direction: column; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1500; }
    </style>
</head>
<body>

<div id="toolbar">
    <input type="file" id="uploadPdf" accept="application/pdf">
    <label>Qtd. Campos:</label>
    <input type="number" id="qtyFields" value="10" style="width: 50px;">
    <button id="btnStart">INICIAR/REINICIAR</button>
    <div id="status">Aguardando PDF...</div>
    <button id="btnDownload" disabled>GERAR PDF FINAL</button>
</div>

<div id="viewer-container">
    <div id="canvas-wrapper">
        <canvas id="pdf-canvas"></canvas>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div id="config-modal">
    <h3>Configurar Campo</h3>
    <div class="form-group">
        <label>Nome do Campo (ID):</label>
        <input type="text" id="editLabel">
    </div>
    <div class="form-group">
        <label>Tipo:</label>
        <select id="editType">
            <option value="text">Texto Simples</option>
            <option value="multiline">Texto Multi-linha</option>
            <option value="dropdown">Menu Suspenso (Dropdown)</option>
        </select>
    </div>
    <div id="dropdown-options" class="form-group" style="display:none;">
        <label>Opções (separadas por vírgula):</label>
        <input type="text" id="editOptions" placeholder="Opção 1, Opção 2">
    </div>
    <div class="form-group">
        <label>Alinhamento:</label>
        <select id="editAlign">
            <option value="left">Esquerda</option>
            <option value="center" selected>Centralizado</option>
        </select>
    </div>
    <div class="form-group">
        <label>Lógica de Cálculo (Acrobat JS):</label>
        <textarea id="editLogic" rows="4" placeholder="Ex: event.value = this.getField('c1').value * 2;"></textarea>
    </div>
    <div style="display: flex; gap: 10px; margin-top: 15px;">
        <button onclick="saveConfig()" style="background: #27ae60;">SALVAR</button>
        <button onclick="closeConfig()" style="background: #95a5a6;">FECHAR</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
