<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editor de PDF RPG - T20 Style</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        #pdf-container { position: relative; border: 2px solid #333; display: inline-block; cursor: crosshair; }
        #pdf-canvas { display: block; }
        .field-label { position: absolute; background: rgba(255, 255, 0, 0.5); border: 1px solid red; font-size: 10px; pointer-events: none; }
        .controls { margin-bottom: 20px; padding: 15px; background: #f4f4f4; border-radius: 8px; }
    </style>
</head>
<body>

<div class="controls">
    <h3>Configurador de Campos Matemáticos</h3>
    <input type="file" id="uploadPdf" accept="application/pdf">
    <select id="fieldType">
        <option value="campo1">Campo 1 (Multiplicador A)</option>
        <option value="campo2">Campo 2 (Multiplicador B)</option>
        <option value="campo3">Campo 3 (Soma Final)</option>
        <option value="resultado">Campo 4 (RESULTADO)</option>
    </select>
    <button id="downloadBtn" style="background: green; color: white; padding: 10px;">Baixar PDF com Lógica</button>
    <p><small>Clique no PDF para posicionar o campo selecionado acima.</small></p>
</div>

<div id="pdf-container">
    <canvas id="pdf-canvas"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
